<div class="m-3">
<label class="form-control-label">Name</label>
<input type="text"
[(ngModel)]="name"
name="name"
(keyup)="checkName()"
class="form-control"
placeholder="Enter name">
<label class="form-control-error">{{errorName}}</label>
</div>

<div class="m-3">
<label class="form-control-label">Email</label>
<input type="email"
[(ngModel)]="email"
name="email"
(keyup)="checkEmail()"
class="form-control"
placeholder="Enter email">
<label class="form-control-error">{{errorEmail}}</label>
</div>

<div class="m-3">
<label class="form-control-label">Phone</label>
<input type="tel"
[(ngModel)]="phone"
name="phone"
(keyup)="checkPhone()"
class="form-control"
placeholder="Enter phone">
<label class="form-control-error">{{errorPhone}}</label>
</div>
<form (submit)="submitForm()">
<input type="submit" class="btn btn-primary" [value]="formType === 'add' ? 'Add' : 'Save'" [disabled]="!name || !email || !phone">
</form>
