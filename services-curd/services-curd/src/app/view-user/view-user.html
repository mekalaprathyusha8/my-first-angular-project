@if (users.length){
    <h2 class="text-center mt-7">User List</h2>
    <div class="row">
        @for (user of users; track $index){
            <div class="col-3 p-3">
                <div class="card p-5">
                    <div class="mt-3">
                        <div class="text-light fs-p-8">Name</div>
                        <div class="font-bolder">{{ user.name }}</div>
                    </div>
                    <div class="mt-3">
                        <div class="text-light fs-p-8">Email</div>
                        <div class="font-bolder">{{ user.email }}</div>
                    </div>
                        <div class="mt-3">
                        <div class="text-light fs-p-8">Phone</div>
                        <div class="font-bolder">{{ user.phone }}</div>
                    </div>
                    <div class="mt-3">
                        <div class="row">
                            <div class="col-6 p-5">
                                <button class="btn btn-info w-100"(click)="editUser(user.userid)">Edit</button>
                            </div>
                            <div class="col-6 p-5">
                                <button class="btn btn-danger w-100"(click)="deleteUser(user.userid)">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        }
    </div>
}@else{
    <h2 class="text-center">No Users Found</h2>
}
