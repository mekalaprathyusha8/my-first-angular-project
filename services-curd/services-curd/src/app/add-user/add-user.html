<div class="row mt-7">
    <div class="col-4"></div>
    <div class="col-4">
        <div class="card p-5">
            <h3 class="text-center">{{title}}</h3>
            <form (submit)="addUser()">
                <div class="mt-3">
                    <label for="name">Name</label>
                    <input type="text" name="name" [(ngModel)]="user.name" class="form-control" placeholder="Enter name"/>
                </div>
                <div class="mt-3">
                    <label for="email">Email</label>
                    <input type="email" name="email" [(ngModel)]="user.email" class="form-control" placeholder="Enter email"/>
                </div>
                <div class="mt-3">
                    <label for="phone">Phone</label>
                    <input type="text" name="phone" [(ngModel)]="user.phone" class="form-control" placeholder="Enter phone"/>
                </div>
                <div class="mt-3">
                    <input type="submit" value="{{btnvalue}}" class="btn btn-primary w-100"/>
                </div>
            </form>
        </div>
    </div>
    <div class="col-4"></div>

</div>
