<section class="section">

    <form (ngSubmit)="addUser()"class="form">
        <div class="heading">
            <h1 >{{formHeading}}</h1>
        </div>
        <div class="box"> 
            <label for="name">Name :</label>
            <input class="input" type="text" name="name" [(ngModel)]="name">
        </div>
        <div class="box">
            <label for="email">Email :</label>
            <input class="input" type="email" name="email" [(ngModel)]="email">
        </div>
        <div class="box">   
            <label for="phone">Phone :</label>
            <input class="input" type="tel" name="phone" [(ngModel)]="phone">
        </div>
        <div class="box">
            <label>Gender :</label>
            <div>
               
                <input id="female" type="radio" name="gender" value="female" [(ngModel)]="gender">
                <label for="female">Female</label>
                  <input id="male" type="radio" name="gender" value="male" [(ngModel)]="gender">
                <label for="male" >Male</label>

               
            </div>
        </div>
        <div class="box">
            <label for="course">Courses :</label>
            <div>
                <input type="checkbox" id="C" [(ngModel)]="C" name="C" value="C">
                <label for="C">C</label>
                <input type="checkbox" id="Js" [(ngModel)]="Js" name="Js" value="Js">
                <label for="Js">Js</label>
                <input type="checkbox" id="Java" [(ngModel)]="Java" name="Java" value="Java">
                <label for="Java">Java</label>
                <input type="checkbox" id="Python" [(ngModel)]="Python" name="Python" value="Python">
                <label for="Python">Python</label>


            </div>
        </div>
        <div class="box">
            <label for="department">Department</label>
            <select name="department" [(ngModel)]="department">
                <option value="">Select :</option>
                <option value="CSM">CSM</option>
                <option value="IT">IT</option>
                <option value="CSD">CSD</option>
                <option value="CSE">CSE</option>  
                <option value="ECE">ECE</option>   
            </select>  
        </div>
        <div class="box"> 
            <label for="address" >Address :</label>
            <!-- <input class="input" type="text" name="address" [(ngModel)]="address" >  -->
            <textarea id="address" name="address" rows="4" cols="50"  [(ngModel)]="address"></textarea>
        </div>
        <div class="box">
            <button class="btn" id="submit" type="submit">{{buttonText}}</button>
        </div>
    </form>

    <div class="display-user">
        <table class="table">
            <thead>
                <tr>
                    <td class="table-data">Name</td>
                    <td class="table-data">Email</td>
                    <td class="table-data">Address</td>
                    <td class="table-data">Department</td>
                    <td class="table-data">Course</td>
                    <td class="table-data">Gender</td>
                    <td class="table-data">Phone</td>
                    <td class="table-data">Edit</td>
                    <td class="table-data">Delete</td>
                </tr>
            </thead>
            <tbody>
                @for (users of user; track users.id) {
                    <tr>
                        <td class="table-data">{{users.name}}</td>
                        <td class="table-data">{{users.email}}</td>
                        <td class="table-data">{{users.address}}</td>
                        <td class="table-data">{{users.department}}</td>
                        <td class="table-data">{{users.course}}</td>
                        <td class="table-data">{{users.gender}}</td>
                        <td class="table-data">{{users.phone}}</td>
                        <td class="table-data" ><button (click)="editUser(users.id)">edit</button></td>
                        <td class="table-data"><button (click)="deleteUser(users.id)">delete</button></td>
                    </tr>
                } 
            </tbody>
        </table>
    </div>

</section>
