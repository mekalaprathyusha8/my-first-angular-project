<div class="middle h-100">
    <div class="card user-form p-5">
        <h2 class="text-center">Add User</h2>
        <form >
            <div class="mt-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" [(ngModel)]="user.name">
            </div>
            <div class="mt-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" [(ngModel)]="user.email">
            </div>
            <div class="mt-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" [(ngModel)]="user.phone">
            </div>
            <div class="mt-3">
                <input type="submit" class="btn btn-primary-light w-100" (click)="onSubmit()">
            </div>
        </form>
    </div>
</div>
